<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Iris</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">

    <!-- 钓鱼警告 Banner -->
    <div class="phishing-banner hidden" id="phishingBanner">
      <div class="phishing-icon">🚨</div>
      <div class="phishing-body">
        <div class="phishing-title" id="phishingTitle"></div>
        <div class="phishing-sub" id="phishingSub"></div>
        <div class="phishing-legit" id="phishingLegit"></div>
      </div>
    </div>

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <img src="icons/icon32.png" class="logo-icon" alt="Iris" />
        <span class="logo-text">Iris</span>
        <div class="logo-dot" id="logoDot"></div>
      </div>
      <div class="header-right">
        <div class="site-badge" id="siteBadge">—</div>
        <button class="history-btn" id="historyBtn" title="History">📊</button>
        <button class="gear-btn" id="gearBtn" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Verdict -->
    <div class="verdict-section" id="verdictSection">
      <div class="verdict-icon" id="verdictIcon">🔍</div>
      <div class="verdict-body">
        <div class="verdict-title" id="verdictTitle"></div>
        <div class="verdict-sub" id="verdictSub"></div>
      </div>
    </div>

    <!-- Session 汇总栏 -->
    <div class="session-bar" id="sessionBar">
      <span class="session-label" id="sessionLabel"></span>
      <span class="session-stat" id="sessTr">
        <span class="session-ico">🔍</span>
        <span class="session-num" id="sessTrackers">0</span>
      </span>
      <span class="session-sep">·</span>
      <span class="session-stat" id="sessAi">
        <span class="session-ico">🤖</span>
        <span class="session-num" id="sessAiCalls">0</span>
      </span>
      <span class="session-sep">·</span>
      <span class="session-stat" id="sessLt">
        <span class="session-ico">⚠️</span>
        <span class="session-num" id="sessLowTrust">0</span>
      </span>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <div class="stat-num" id="statTrackers">—</div>
        <div class="stat-label" id="statLabelTrackers"></div>
      </div>
      <div class="divider-v"></div>
      <div class="stat">
        <div class="stat-num" id="statRequests">—</div>
        <div class="stat-label" id="statLabelRequests"></div>
      </div>
      <div class="divider-v"></div>
      <div class="stat">
        <div class="stat-num" id="statApis">—</div>
        <div class="stat-label" id="statLabelApis"></div>
      </div>
    </div>

    <!-- Comparison bar -->
    <div class="comparison-section" id="comparisonSection" style="display:none">
      <div class="comp-label" id="compLabel"></div>
      <div class="comp-track">
        <div class="comp-fill" id="compFill"></div>
        <div class="comp-marker"></div>
      </div>
      <div class="comp-ends">
        <span id="compEndLeft"></span>
        <span id="compEndRight"></span>
      </div>
    </div>

    <!-- 历史记录面板（v1.7） -->
    <div class="history-panel hidden" id="historyPanel">
      <div class="sp-header">
        <span class="sp-title" id="histTitle">History</span>
        <button class="sp-close" id="historyClose">✕</button>
      </div>
      <div class="hist-summary" id="histSummary"></div>
      <div class="hist-scroll" id="histScroll"></div>
    </div>

    <!-- 设置面板（v1.6，覆盖 sections 区域）-->
    <div class="settings-panel hidden" id="settingsPanel">
      <div class="sp-header">
        <span class="sp-title" id="spTitle"></span>
        <button class="sp-close" id="settingsClose">✕</button>
      </div>
      <div class="sp-scroll">

        <div class="sp-section-label" id="spLabelModules"></div>

        <label class="sp-row">
          <span class="sp-ico">🔍</span>
          <span class="sp-name" id="spMod_trackers"></span>
          <span class="tog"><input type="checkbox" id="tog_trackers" /><span class="tog-sl"></span></span>
        </label>
        <label class="sp-row">
          <span class="sp-ico">🧬</span>
          <span class="sp-name" id="spMod_fingerprinting"></span>
          <span class="tog"><input type="checkbox" id="tog_fingerprinting" /><span class="tog-sl"></span></span>
        </label>
        <label class="sp-row">
          <span class="sp-ico">🤖</span>
          <span class="sp-name" id="spMod_aiSafety"></span>
          <span class="tog"><input type="checkbox" id="tog_aiSafety" /><span class="tog-sl"></span></span>
        </label>
        <label class="sp-row">
          <span class="sp-ico">🛡️</span>
          <span class="sp-name" id="spMod_contentSafety"></span>
          <span class="tog"><input type="checkbox" id="tog_contentSafety" /><span class="tog-sl"></span></span>
        </label>
        <label class="sp-row">
          <span class="sp-ico">💳</span>
          <span class="sp-name" id="spMod_spendGuard"></span>
          <span class="tog"><input type="checkbox" id="tog_spendGuard" /><span class="tog-sl"></span></span>
        </label>
        <label class="sp-row">
          <span class="sp-ico">🍪</span>
          <span class="sp-name" id="spMod_cookieConsent"></span>
          <span class="tog"><input type="checkbox" id="tog_cookieConsent" /><span class="tog-sl"></span></span>
        </label>

        <div class="sp-section-label" id="spLabelSensitivity"></div>

        <div class="sp-row sp-row-sens">
          <span class="sp-ico">💳</span>
          <div class="sp-sens-wrap">
            <div class="sp-name" id="spSensTitle"></div>
            <div class="sp-pill-row">
              <button class="sp-pill" id="sensNormal" data-val="normal"></button>
              <button class="sp-pill" id="sensStrict" data-val="strict"></button>
            </div>
            <div class="sp-sens-desc" id="spSensDesc"></div>
          </div>
        </div>

        <div class="sp-note" id="spNote"></div>
      </div>
    </div>

    <!-- Section Cards (v1.5) -->
    <div class="sections" id="sections">

      <!-- Trackers -->
      <div class="sc" id="cardTrackers">
        <button class="sc-hdr open" id="hdrTrackers">
          <span class="sc-dot" id="dotTrackers"></span>
          <span class="sc-ico">🔍</span>
          <span class="sc-ttl" id="ttlTrackers"></span>
          <span class="sc-bdg hidden" id="bdgTrackers"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body open" id="bdyTrackers">
          <div class="empty-state" id="emptyTrackers">
            <div class="empty-icon">✅</div>
            <div class="empty-title" id="emptyTrackersTitle"></div>
            <div class="empty-sub" id="emptyTrackersSub"></div>
          </div>
          <div id="trackerList"></div>
        </div>
      </div>

      <!-- Browser APIs -->
      <div class="sc" id="cardApis">
        <button class="sc-hdr" id="hdrApis">
          <span class="sc-dot" id="dotApis"></span>
          <span class="sc-ico">🧬</span>
          <span class="sc-ttl" id="ttlApis"></span>
          <span class="sc-bdg hidden" id="bdgApis"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body" id="bdyApis">
          <div class="empty-state" id="emptyApis">
            <div class="empty-icon">✅</div>
            <div class="empty-title" id="emptyApisTitle"></div>
            <div class="empty-sub" id="emptyApisSub"></div>
          </div>
          <div id="apiList"></div>
        </div>
      </div>

      <!-- AI Safety -->
      <div class="sc" id="cardAi">
        <button class="sc-hdr" id="hdrAi">
          <span class="sc-dot" id="dotAi"></span>
          <span class="sc-ico">🤖</span>
          <span class="sc-ttl" id="ttlAi"></span>
          <span class="sc-bdg hidden" id="bdgAi"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body" id="bdyAi">
          <div id="aiSourcesMount"></div>
          <div class="empty-state" id="emptyAi">
            <div class="empty-icon">🤖</div>
            <div class="empty-title" id="emptyAiTitle"></div>
            <div class="empty-sub" id="emptyAiSub"></div>
          </div>
          <div id="aiList"></div>
        </div>
      </div>

      <!-- Content Safety -->
      <div class="sc" id="cardContent">
        <button class="sc-hdr" id="hdrContent">
          <span class="sc-dot" id="dotContent"></span>
          <span class="sc-ico">🛡️</span>
          <span class="sc-ttl" id="ttlContent"></span>
          <span class="sc-bdg hidden" id="bdgContent"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body" id="bdyContent">
          <div class="cs-summary cs-rating-green" id="csSummary"></div>
          <div class="empty-state hidden" id="emptyContent">
            <div class="empty-icon">✅</div>
            <div class="empty-title" id="emptyContentTitle"></div>
            <div class="empty-sub" id="emptyContentSub"></div>
          </div>
          <div id="contentSafetyList"></div>
        </div>
      </div>

      <!-- Spend Guard -->
      <div class="sc" id="cardSpend">
        <button class="sc-hdr" id="hdrSpend">
          <span class="sc-dot" id="dotSpend"></span>
          <span class="sc-ico">💳</span>
          <span class="sc-ttl" id="ttlSpend"></span>
          <span class="sc-bdg hidden" id="bdgSpend"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body" id="bdySpend">
          <div class="cs-summary cs-rating-neutral" id="spendSummary"></div>
          <div class="empty-state hidden" id="emptySpend">
            <div class="empty-icon">🔍</div>
            <div class="empty-title" id="emptySpendTitle"></div>
            <div class="empty-sub" id="emptySpendSub"></div>
          </div>
          <div id="spendList"></div>
        </div>
      </div>

      <!-- Cookie Consent (v1.5) -->
      <div class="sc" id="cardCookie">
        <button class="sc-hdr" id="hdrCookie">
          <span class="sc-dot" id="dotCookie"></span>
          <span class="sc-ico">🍪</span>
          <span class="sc-ttl" id="ttlCookie"></span>
          <span class="sc-bdg hidden" id="bdgCookie"></span>
          <span class="sc-chv">›</span>
        </button>
        <div class="sc-body" id="bdyCookie">
          <div class="cs-summary cs-rating-neutral" id="cookieSummary"></div>
          <div id="cookieList"></div>
          <div id="confirmshamingMount"></div>
        </div>
      </div>

    </div>

    <!-- 底部数据库状态 -->
    <div class="db-footer" id="dbFooter">
      <span class="db-dot" id="dbDot"></span>
      <span id="dbStatus"></span>
      <a class="db-link" href="https://github.com/koni20/iris-extension" target="_blank" rel="noopener noreferrer">★ GitHub</a>
    </div>

  </div>

  <script src="trackers.js"></script>
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
